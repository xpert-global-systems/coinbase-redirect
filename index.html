<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XPERT Global — Secure Crypto Checkout</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #122044, #050914 70%);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite alternate;
    }
    .orb.blue { background: #0052ff; top: -120px; left: -80px; }
    .orb.purple { background: #7a3cff; bottom: -140px; right: -100px; }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(40px); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 420px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.45);
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      background: linear-gradient(135deg, #0052ff, #3a7bff);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      transition: 0.25s;
      box-shadow: 0 4px 14px rgba(0, 82, 255, 0.4);
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0, 82, 255, 0.55);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="orb blue"></div>
  <div class="orb purple"></div>

  <div class="container">
    <h1>Complete Your Payment</h1>
    <p>Tap the button below to confirm your purchase securely.</p>

    <a class="button" href="https://nowpayments.io/payment/?iid=4609452500">
      Confirm Purchase
    </a>
  </div>

</body>
</html>
